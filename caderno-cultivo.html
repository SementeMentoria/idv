<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno de Cultivo — Semente</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream-dark: #EDE6D6;
  --sand: #DDD0BC;
  --bark: #3D2E1E;
  --bark-mid: #6B5344;
  --bark-light: #A08878;
  --gold: #B8925A;
  --gold-light: #E8D4B0;
  --rose: #C9897A;
  --rose-light: #F0D5CF;
  --white: #FDFAF5;
  --green: #5A7A5A;
  --green-light: #E8F2E8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--bark); min-height: 100vh; }

/* HEADER */
header {
  background: var(--bark);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-left img { height: 52px; width: auto; }
.header-titles h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; color: var(--gold-light);
}
.header-titles p { font-size: 11px; color: var(--bark-light); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
.btn-pdf {
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold-light); border-radius: 30px;
  padding: 9px 22px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; letter-spacing: 0.04em;
  transition: all 0.2s;
}
.btn-pdf:hover { background: var(--gold); color: var(--bark); }

/* ABAS */
.tabs-wrap {
  background: var(--cream-dark);
  border-bottom: 2px solid var(--sand);
  overflow-x: auto; white-space: nowrap;
  padding: 0 24px;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: inline-flex; gap: 6px; padding: 10px 0; }
.tab {
  padding: 9px 18px; font-size: 12px; font-weight: 500;
  color: var(--bark-mid); cursor: pointer;
  border-radius: 30px; border: 1.5px solid transparent;
  transition: all 0.2s; white-space: nowrap;
  letter-spacing: 0.03em; background: transparent;
}
.tab:hover { background: var(--white); border-color: var(--sand); color: var(--bark); }
.tab.active {
  background: var(--bark); color: var(--gold-light);
  border-color: var(--bark);
  box-shadow: 0 2px 8px rgba(61,46,30,0.2);
}

/* MAIN */
main { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }

/* SEÇÕES */
.section { margin-bottom: 36px; }
.section-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 8px;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400; color: var(--bark);
  line-height: 1.2; margin-bottom: 6px;
}
.section-desc { font-size: 13px; color: var(--bark-light); line-height: 1.65; margin-bottom: 16px; }

/* CARD */
.card {
  background: var(--white); border: 1.5px solid var(--sand);
  border-radius: 16px; padding: 24px; margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 500; color: var(--bark);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.card-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
}

/* PERGUNTA DESTAQUE */
.pergunta-ouro {
  background: linear-gradient(135deg, #3D2E1E 0%, #6B5344 100%);
  border-radius: 16px; padding: 28px 24px; margin-bottom: 16px;
}
.pergunta-ouro .pergunta-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-style: italic; font-weight: 300;
  color: var(--gold-light); line-height: 1.5; margin-bottom: 16px;
}
.pergunta-ouro textarea {
  width: 100%; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  padding: 14px 16px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--white); line-height: 1.7;
  resize: none; outline: none; min-height: 100px;
}
.pergunta-ouro textarea::placeholder { color: rgba(255,255,255,0.3); }
.pergunta-ouro textarea:focus { border-color: rgba(184,146,90,0.5); }

/* INPUTS */
textarea, input[type="text"], input[type="number"] {
  width: 100%; background: var(--cream);
  border: 1.5px solid var(--sand); border-radius: 10px;
  padding: 12px 14px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--bark); line-height: 1.6;
  resize: none; outline: none; transition: border-color 0.2s;
}
textarea:focus, input:focus { border-color: var(--gold); background: var(--white); }
textarea::placeholder, input::placeholder { color: var(--bark-light); }

/* MÉTRICAS GRID */
.metricas-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px;
}
.metrica-item label {
  display: block; font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--bark-light); margin-bottom: 6px;
}
.metrica-item input {
  text-align: center; font-size: 20px; font-weight: 300;
  font-family: 'Cormorant Garamond', serif; padding: 10px;
}

/* PROJETOS */
.projeto-row {
  display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start;
}
.projeto-row textarea { min-height: 48px; flex: 1; }
.btn-remove {
  background: none; border: none; cursor: pointer;
  color: var(--bark-light); font-size: 18px; padding: 12px 8px;
  transition: color 0.2s; flex-shrink: 0;
}
.btn-remove:hover { color: var(--rose); }
.btn-add {
  background: none; border: 1.5px dashed var(--sand);
  color: var(--bark-light); border-radius: 10px;
  padding: 10px 20px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; width: 100%;
  transition: all 0.2s; margin-top: 4px;
}
.btn-add:hover { border-color: var(--gold); color: var(--gold); }

/* INSIGHTS */
.insights-area textarea { min-height: 120px; }

/* SALVO */
.save-indicator {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bark); color: var(--gold-light);
  font-size: 12px; padding: 10px 18px; border-radius: 30px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none;
  z-index: 100;
}
.save-indicator.show { opacity: 1; }

/* ENCONTRO HEADER */
.encontro-hero {
  background: var(--bark); border-radius: 16px;
  padding: 28px 28px 24px; margin-bottom: 28px;
  display: flex; align-items: flex-start; gap: 16px;
}
.encontro-emoji { font-size: 32px; flex-shrink: 0; margin-top: 2px; }
.encontro-hero h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300; color: var(--gold-light);
  margin-bottom: 6px;
}
.encontro-hero p { font-size: 13px; color: var(--bark-light); line-height: 1.6; }
.encontro-fase {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
}

/* EM BREVE */
.em-breve {
  text-align: center; padding: 80px 20px;
  color: var(--bark-light);
}
.em-breve .emoji { font-size: 40px; margin-bottom: 16px; }
.em-breve h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300; color: var(--bark);
  margin-bottom: 8px;
}
.em-breve p { font-size: 14px; line-height: 1.7; }

/* DIVIDER */
.divider { height: 1px; background: var(--sand); margin: 32px 0; }

@media (max-width: 560px) {
  header { padding: 16px 20px; }
  main { padding: 28px 16px 60px; }
  .metricas-grid { grid-template-columns: repeat(2, 1fr); }
  .encontro-hero { padding: 20px; }
}

  /* ── Métricas de percepção (sliders) ── */
  .percep-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; color: var(--bark);
    margin-bottom: 4px;
  }
  .percep-section-title em { color: var(--gold); font-style: italic; }
  .percep-section-desc {
    font-size: 13px; color: var(--bark-light); line-height: 1.65;
    margin-bottom: 24px; font-style: italic;
  }
  .percep-card {
    background: var(--white); border: 1.5px solid var(--sand);
    border-radius: 16px; padding: 24px 28px; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .percep-card::before {
    content: ''; position: absolute; top: 0; left: 24px; right: 24px;
    height: 2px; background: linear-gradient(90deg, var(--gold), transparent);
  }
  .percep-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 4px;
  }
  .percep-desc {
    font-size: 12px; color: var(--bark-light); font-style: italic;
    margin-bottom: 20px; line-height: 1.6;
  }
  .percep-slider-wrap { }
  .percep-col-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--bark-light); opacity: 0.6;
    margin-bottom: 8px;
  }
  .percep-val-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .percep-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300; color: var(--bark-mid);
    line-height: 1;
  }
  .percep-scale { font-size: 11px; color: var(--bark-light); opacity: 0.5; }
  .percep-range {
    width: 100%; appearance: none; height: 6px; border-radius: 3px;
    outline: none; border: none; cursor: pointer;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--val,50%), var(--sand) var(--val,50%), var(--sand) 100%);
  }
  .percep-range::-webkit-slider-thumb {
    appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); border: 2.5px solid white;
    box-shadow: 0 1px 4px rgba(61,46,30,0.25); cursor: pointer;
  }
  .percep-range::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); border: 2.5px solid white; cursor: pointer;
  }


  /* ── Tela de senha ── */
  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bark);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    padding: 24px;
  }
  #lock-screen .lock-logo {
    height: 72px; width: auto; margin-bottom: 32px;
    opacity: 0.9;
  }
  #lock-screen .lock-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    color: var(--gold-light);
    margin-bottom: 8px; text-align: center;
  }
  #lock-screen .lock-sub {
    font-size: 12px; color: var(--bark-light);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 40px; text-align: center;
  }
  #lock-screen .g-recaptcha {
    display: flex;
    justify-content: center;
    margin: 4px 0;
  }
  #lock-screen .lock-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 32px 36px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #lock-screen label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--bark-light);
  }
  #lock-screen input[type=text],
  #lock-screen input[type=password] {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; color: var(--white);
    outline: none; width: 100%;
    transition: border-color 0.2s;
    letter-spacing: 0.1em;
  }
  #lock-screen input[type=text]:focus,
  #lock-screen input[type=password]:focus {
    border-color: rgba(184,146,90,0.6);
  }
  #lock-screen input[type=text]::placeholder,
  #lock-screen input[type=password]::placeholder {
    color: rgba(255,255,255,0.2); letter-spacing: 0.05em;
  }

  #lock-screen .lock-btn {
    background: var(--gold); color: var(--bark);
    border: none; border-radius: 100px;
    padding: 14px 32px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  #lock-screen .lock-btn:hover { background: var(--gold-light); }
  #lock-screen .lock-error {
    font-size: 12px; color: var(--rose);
    text-align: center; min-height: 18px;
    transition: opacity 0.2s;
  }
  #lock-screen.hidden { display: none; }

</style>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<!-- TELA DE SENHA -->
<div id="lock-screen">
  <img class="lock-logo" id="lock-logo" src="" alt="Semente">
  <div class="lock-title">Caderno de Cultivo</div>
  <div class="lock-sub">Mentoria Semente · Acesso restrito</div>
  <div class="lock-box">
    <label for="login-input">Login</label>
    <input type="text" id="login-input" placeholder="seu login"
      autocomplete="username"
      onkeydown="if(event.key==='Enter') document.getElementById('senha-input').focus()">
    <label for="senha-input">Senha</label>
    <input type="password" id="senha-input" placeholder="••••••••"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter') verificarSenha()">
    <div class="g-recaptcha"
      data-sitekey="6Ld5RossAAAAACvdXMz0YxkdC2ERDuoORZQdlSKG"
      data-theme="dark"
      style="transform:scale(0.88);transform-origin:0 0;margin-bottom:4px;">
    </div>
    <button class="lock-btn" id="lock-btn" onclick="verificarSenha()">Entrar →</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>


<header>
  <div class="header-left" id="header-logo"></div>
  <button class="btn-pdf" onclick="exportPDF()">⬇ Exportar PDF</button>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<main id="main-content"></main>

<div class="save-indicator" id="save-indicator">✓ Salvo automaticamente</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

// ── SENHA DE ACESSO ──
// 👇 Troque aqui a senha para cada aluna
// 👇 Adicione login e senha juntos — mesma posição = mesma aluna
const LOGINS   = ['aluna01'];
const SENHAS   = ['semente*2026'];
const SENHA_KEY = 'semente_auth';

// ── RATE LIMITER ──
const RATE_KEY        = 'semente_rl';
const MAX_TENTATIVAS  = 3;
const BLOQUEIO_MIN    = 5;

function getRateData() {
  try {
    return JSON.parse(localStorage.getItem(RATE_KEY) || '{"tentativas":0,"bloqueadoAte":0}');
  } catch(e) { return { tentativas: 0, bloqueadoAte: 0 }; }
}

function setRateData(data) {
  try { localStorage.setItem(RATE_KEY, JSON.stringify(data)); } catch(e) {}
}

function verificarBloqueio() {
  const data  = getRateData();
  const agora = Date.now();
  if (data.bloqueadoAte && agora < data.bloqueadoAte) {
    const restam = Math.ceil((data.bloqueadoAte - agora) / 60000);
    return `Muitas tentativas. Tente novamente em ${restam} min.`;
  }
  // Resetar se o bloqueio já expirou
  if (data.bloqueadoAte && agora >= data.bloqueadoAte) {
    setRateData({ tentativas: 0, bloqueadoAte: 0 });
  }
  return null;
}

function registrarTentativaFalha() {
  const data  = getRateData();
  const agora = Date.now();
  data.tentativas = (data.tentativas || 0) + 1;
  if (data.tentativas >= MAX_TENTATIVAS) {
    data.bloqueadoAte = agora + (BLOQUEIO_MIN * 60 * 1000);
    data.tentativas   = 0;
  }
  setRateData(data);
}

function registrarSucesso() {
  setRateData({ tentativas: 0, bloqueadoAte: 0 });
}

function msgTentativasRestantes() {
  const data    = getRateData();
  const restam  = MAX_TENTATIVAS - (data.tentativas || 0);
  if (restam <= MAX_TENTATIVAS - 1) {
    return ` (${restam} tentativa${restam !== 1 ? 's' : ''} restante${restam !== 1 ? 's' : ''})`;
  }
  return '';
}

function verificarSenha() {
  const erro = document.getElementById('lock-error');

  // Camada 1 — Rate limiter
  const bloqueio = verificarBloqueio();
  if (bloqueio) {
    erro.textContent = bloqueio;
    return;
  }

  // Camada 2 — reCAPTCHA
  const recaptchaResponse = typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : 'local';
  if (!recaptchaResponse) {
    erro.textContent = 'Por favor, confirme que você não é um robô.';
    return;
  }
  const login = document.getElementById('login-input').value.trim();
  const senha = document.getElementById('senha-input').value.trim();
  const erro  = document.getElementById('lock-error');
  const idx   = LOGINS.indexOf(login);
  if (idx !== -1 && SENHAS[idx] === senha) {
    registrarSucesso();
    try { sessionStorage.setItem(SENHA_KEY, '1'); } catch(e) {}
    document.getElementById('lock-screen').classList.add('hidden');
    erro.textContent = '';
  } else {
    registrarTentativaFalha();
    const bloqueioNovo = verificarBloqueio();
    erro.textContent = bloqueioNovo
      ? bloqueioNovo
      : 'Login ou senha incorretos. Tente novamente.' + msgTentativasRestantes();
    document.getElementById('senha-input').value = '';
    document.getElementById('login-input').focus();
    if (typeof grecaptcha !== 'undefined') {
      grecaptcha.reset();
    }
    ['login-input','senha-input'].forEach(id => {
      const el = document.getElementById(id);
      el.style.borderColor = 'rgba(201,137,122,0.6)';
      setTimeout(() => { el.style.borderColor = 'rgba(255,255,255,0.15)'; }, 1500);
    });
  }
}

// Verificar se já autenticou nesta sessão
(function() {
  try {
    if (sessionStorage.getItem(SENHA_KEY) === '1') {
      document.addEventListener('DOMContentLoaded', function() {
        var ls = document.getElementById('lock-screen');
        if (ls) ls.classList.add('hidden');
      });
    }
  } catch(e) {}

// ── ABAS ──
const ABAS = [
  { id: 'e1', label: '1º Encontro' },
  { id: 'e2', label: '2º Encontro' },
  { id: 'e3', label: '3º Encontro' },
  { id: 'e4', label: '4º Encontro' },
  { id: 'e5', label: '5º Encontro' },
  { id: 'e6', label: '6º Encontro' },
  { id: 'e7', label: '7º Encontro' },
  { id: 'e8', label: '8º Encontro' },
];

let abaAtiva = 'e1';
const tabsEl = document.getElementById('tabs');

ABAS.forEach(aba => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (aba.id === abaAtiva ? ' active' : '');
  btn.textContent = aba.label;
  btn.onclick = () => { abaAtiva = aba.id; renderAba(); updateTabs(); };
  tabsEl.appendChild(btn);
});

function updateTabs() {
  tabsEl.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', ABAS[i].id === abaAtiva);
  });
}

// ── STORAGE ──
function save(key, val) {
  try { localStorage.setItem('semente_' + key, val); } catch(e) {}
  showSaved();
}
function load(key, fallback = '') {
  try { return localStorage.getItem('semente_' + key) || fallback; } catch(e) { return fallback; }
}
function loadList(key, fallback = ['']) {
  try {
    const v = localStorage.getItem('semente_' + key);
    return v ? JSON.parse(v) : fallback;
  } catch(e) { return fallback; }
}
function saveList(key, arr) {
  try { localStorage.setItem('semente_' + key, JSON.stringify(arr)); } catch(e) {}
  showSaved();
}

let saveTimer;
function showSaved() {
  clearTimeout(saveTimer);
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  saveTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function autoSave(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => save(key, el.value));
}

// ── RENDER ──
function renderAba() {
  const main = document.getElementById('main-content');
  if (abaAtiva === 'e1') main.innerHTML = renderE1();
  else if (abaAtiva === 'e2') { main.innerHTML = renderE2(); bindE2(); }
  else if (abaAtiva === 'e3') { main.innerHTML = renderE3(); bindE3(); }
  else if (abaAtiva === 'e4') main.innerHTML = renderEmBreve('4º Encontro', 'Design Thinking — Pesquisa', '🌿', 'Fase 3 · A Germinação', 'Mapa de empatia e jornada do cliente.', [
    { url: 'https://sementementoria.github.io/idv/designthinking.html', label: 'Abrir Design Thinking', cor: 'var(--green)' }
  ]);
  else if (abaAtiva === 'e5') main.innerHTML = renderEmBreve('5º Encontro', 'Design Thinking — Síntese', '🌿', 'Fase 3 · A Germinação', 'Síntese da pesquisa, construção da solução e síndrome da impostora.', [
    { url: 'https://sementementoria.github.io/idv/impostora.html',            label: 'Superando a Impostora',     cor: 'var(--rose)' },
    { url: 'https://sementementoria.github.io/idv/inventario-evidencias.html', label: 'Inventário de Evidências', cor: 'var(--rose)' },
    { url: 'https://sementementoria.github.io/idv/mapa-coragem.html',          label: 'Mapa da Coragem',          cor: 'var(--rose)' }
  ]);
  else if (abaAtiva === 'e6') main.innerHTML = renderEmBreve('6º Encontro', 'Arquitetura da Solução', '🌳', 'Fase 4 · A Estrutura', 'Método, etapas, promessa e transformação.', [
    { url: 'https://sementementoria.github.io/idv/arquitetura-solucao.html', label: 'Abrir Arquitetura da Solução', cor: 'var(--gold)' }
  ]);
  else if (abaAtiva === 'e7') main.innerHTML = renderEmBreve('7º Encontro', 'Planejamento e Execução', '🌾', 'Fase 5 · O Cultivo', 'SMART e Kanban — seu plano real de ação.', [
    { url: 'https://sementementoria.github.io/idv/plano-acao.html', label: 'Abrir Plano de Ação', cor: 'var(--green)' }
  ]);
  else if (abaAtiva === 'e8') main.innerHTML = renderEmBreve('8º Encontro', 'Posicionamento e Fechamento', '🌻', 'Fase 6 · A Colheita', 'Comunicação, planejamento 90 dias e fechamento da mentoria.', [
    { url: 'https://sementementoria.github.io/idv/fechamento-resumo.html', label: 'Abrir Fechamento e Resumo', cor: 'var(--gold)' }
  ]);

  if (abaAtiva === 'e1') { bindE1(); initPercep(); }
}

function renderE1() {
  const sucesso = load('e1_sucesso');
  const insights = load('e1_insights');
  const ig = load('e1_ig', '');
  const yt = load('e1_yt', '');
  const li = load('e1_li', '');
  const outros = load('e1_outros', '');
  const projAtual = loadList('e1_proj_atual', ['']);
  const projFuturo = loadList('e1_proj_futuro', ['']);

  const projAtualHTML = projAtual.map((v, i) => `
    <div class="projeto-row" id="pa-row-${i}">
      <textarea id="pa-${i}" placeholder="Descreva o projeto..." rows="2">${v}</textarea>
      <button class="btn-remove" onclick="removeProj('atual', ${i})" title="Remover">×</button>

function bindE1() {
  const fields = ['e1_sucesso','e1_ig_seg','e1_ig_alc','e1_ig_eng','e1_ig_nov','e1_li_con','e1_yt_ins','e1_outros_seg','e1_insights'];
  fields.forEach(id => autoSave(id, id));

  // projetos
  ['atual', 'futuro'].forEach(tipo => {
    const key = tipo === 'atual' ? 'e1_proj_atual' : 'e1_proj_futuro';
    const prefix = tipo === 'atual' ? 'pa' : 'pf';
    const list = loadList(key, ['']);
    list.forEach((_, i) => {
      const el = document.getElementById(`${prefix}-${i}`);
      if (el) el.addEventListener('input', () => saveProjList(tipo));
    });
  });
}

function saveProjList(tipo) {
  const key = tipo === 'atual' ? 'e1_proj_atual' : 'e1_proj_futuro';
  const prefix = tipo === 'atual' ? 'pa' : 'pf';
  const list = loadList(key, ['']);
  const vals = list.map((_, i) => {
    const el = document.getElementById(`${prefix}-${i}`);
    return el ? el.value : '';
  });
  saveList(key, vals);
}

function addProj(tipo) {
  const key = tipo === 'atual' ? 'e1_proj_atual' : 'e1_proj_futuro';
  const list = loadList(key, ['']);
  list.push('');
  saveList(key, list);
  renderAba();
}

function removeProj(tipo, idx) {
  const key = tipo === 'atual' ? 'e1_proj_atual' : 'e1_proj_futuro';
  const prefix = tipo === 'atual' ? 'pa' : 'pf';
  const list = loadList(key, ['']);
  // salvar valores atuais antes de remover
  list.forEach((_, i) => {
    const el = document.getElementById(`${prefix}-${i}`);
    if (el) list[i] = el.value;
  });
  list.splice(idx, 1);
  if (list.length === 0) list.push('');
  saveList(key, list);
  renderAba();
}

// ── EXPORT PDF ──
function exportPDF() {
  if (!window.jspdf) { alert('Aguarde o carregamento e tente novamente.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, ml = 20, cw = 170;
  let y = 20;

  function checkPage(n) { if (y + n > 275) { doc.addPage(); y = 20; } }
  function titulo(t) {
    checkPage(14);
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(61,46,30);
    doc.text(t, ml, y); y += 10;
  }
  function label(t) {
    checkPage(8);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(160,136,120);
    doc.text(t.toUpperCase(), ml, y); y += 6;
  }
  function corpo(t) {
    if (!t || !t.trim()) return;
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(61,46,30);
    const lines = doc.splitTextToSize(t, cw);
    checkPage(lines.length * 5 + 4);
    doc.text(lines, ml, y); y += lines.length * 5 + 4;
  }
  function divider() { checkPage(6); doc.setDrawColor(221,208,188); doc.line(ml, y, W-ml, y); y += 8; }

  // Capa
  doc.setFillColor(61,46,30); doc.rect(0,0,210,297,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(28); doc.setTextColor(232,212,176);
  doc.text('Caderno de Cultivo', 105, 120, {align:'center'});
  doc.setFontSize(13); doc.setTextColor(160,136,120);
  doc.text('Mentoria Semente · 1º Encontro', 105, 134, {align:'center'});
  doc.setFontSize(10);
  doc.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')}`, 105, 280, {align:'center'});

  doc.addPage(); y = 20;

  titulo('1º Encontro — Apresentação e Diagnóstico');
  divider();

  label('Minha definição de sucesso para essa mentoria');
  corpo(load('e1_sucesso') || '(não preenchido)');
  divider();

  label('Métricas das redes sociais');
  const metricas = [
    ['Instagram · Seguidores', load('e1_ig_seg')],
    ['Instagram · Visualizações 30 dias', load('e1_ig_alc')],
    ['Instagram · Interações 30 dias', load('e1_ig_eng')],
    ['Instagram · Novos seguidores', load('e1_ig_nov')],
    ['LinkedIn · Conexões', load('e1_li_con')],
    ['YouTube · Inscritos', load('e1_yt_ins')],
    ['Outra rede', load('e1_outros_seg')],
  ];
  metricas.forEach(([k, v]) => {
    if (v && v.trim()) {
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(107,83,68);
      checkPage(6);
      doc.text(`${k}: ${v}`, ml + 4, y); y += 6;
    }
  });
  y += 4; divider();

  label('Projetos em andamento');
  const atual = loadList('e1_proj_atual', ['']);
  atual.forEach((p, i) => { if (p.trim()) corpo(`${i+1}. ${p}`); });
  divider();

  label('Projetos futuros');
  const futuro = loadList('e1_proj_futuro', ['']);
  futuro.forEach((p, i) => { if (p.trim()) corpo(`${i+1}. ${p}`); });
  divider();

  label('Insights e anotações do encontro');
  corpo(load('e1_insights') || '(não preenchido)');

  doc.save('caderno-cultivo-encontro-1.pdf');
}

const PERCEP_IDS = ['clareza','confianca','identidade','execucao','posicao'];

function updatePercep(id, val) {
  val = parseInt(val);
  const valEl = document.getElementById('val_' + id);
  const rangeEl = document.getElementById('range_' + id);
  if (valEl) valEl.textContent = val;
  if (rangeEl) rangeEl.style.setProperty('--val', ((val-1)/9*100) + '%');
  // Salvar usando a mesma chave que o caderno principal lê
  try {
    const stored = JSON.parse(localStorage.getItem('semente_metricas') || '{}');
    if (!stored[id]) stored[id] = { antes: 5, depois: 5 };
    stored[id].antes = val;
    localStorage.setItem('semente_metricas', JSON.stringify(stored));
  } catch(e) {}
  showSaved();
}

function initPercep() {
  try {
    const stored = JSON.parse(localStorage.getItem('semente_metricas') || '{}');
    PERCEP_IDS.forEach(id => {
      const val = (stored[id] && stored[id].antes) ? stored[id].antes : 5;
      const valEl = document.getElementById('val_' + id);
      const rangeEl = document.getElementById('range_' + id);
      if (valEl) valEl.textContent = val;
      if (rangeEl) {
        rangeEl.value = val;
        rangeEl.style.setProperty('--val', ((val-1)/9*100) + '%');
      }
    });
  } catch(e) {}
}

// ── INIT ──
renderAba();
</script>
